<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>A1528B eSRD Range Profile Web UART V01 2026.06.25 15:11</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --ink: #17202a;
      --muted: #667085;
      --line: #d7dde5;
      --focus: #0d9488;
      --r0: #ff0000;
      --r1: #00a000;
      --r2: #0000ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
    }

    header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: center;
      padding: 16px 20px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .status {
      min-width: 240px;
      color: var(--muted);
      font-size: 13px;
      text-align: right;
    }

    main {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      min-height: calc(100vh - 58px);
    }

    aside {
      padding: 16px;
      background: var(--panel);
      border-right: 1px solid var(--line);
    }

    .plot-wrap {
      display: grid;
      grid-template-rows: minmax(360px, 1fr) auto;
      min-width: 0;
      padding: 16px;
      gap: 12px;
    }

    canvas {
      width: 100%;
      height: 100%;
      min-height: 360px;
      display: block;
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 6px;
    }

    .group {
      display: grid;
      gap: 10px;
      margin-bottom: 18px;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    input,
    select,
    button {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #ffffff;
      color: var(--ink);
      font: inherit;
      padding: 8px 10px;
    }

    button {
      cursor: pointer;
      font-weight: 700;
    }

    button.primary {
      background: var(--focus);
      border-color: var(--focus);
      color: #ffffff;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .checks {
      display: grid;
      gap: 8px;
      color: var(--ink);
      font-size: 14px;
    }

    .checks label {
      grid-template-columns: auto 1fr;
      align-items: center;
      color: var(--ink);
      font-weight: 400;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      color: var(--muted);
      font-size: 13px;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 700;
    }

    .swatch {
      width: 18px;
      height: 3px;
      border-radius: 99px;
      background: currentColor;
    }

    .r0 {
      color: var(--r0);
    }

    .r1 {
      color: var(--r1);
    }

    .r2 {
      color: var(--r2);
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(5, minmax(90px, 1fr));
      gap: 8px;
    }

    .metric {
      display: grid;
      gap: 4px;
      padding: 10px;
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 6px;
      min-width: 0;
    }

    .metric b {
      font-size: 18px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .metric span {
      color: var(--muted);
      font-size: 12px;
    }

    .note {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    @media (max-width: 820px) {
      header,
      main {
        grid-template-columns: 1fr;
      }

      .status {
        text-align: left;
      }

      aside {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .metrics {
        grid-template-columns: repeat(2, minmax(120px, 1fr));
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>A1528B eSRD Range Profile Web UART V01 2026.06.25 15:11</h1>
    <div class="status" id="status">Ready.</div>
  </header>

  <main>
    <aside>
      <div class="group">
        <label>
          Baud rate
          <input id="baudRate" type="number" min="1" step="1" value="921600">
        </label>
        <label>
          Display window
          <input id="windowSize" type="number" min="20" max="5000" step="10" value="600">
        </label>
        <div class="row">
          <button id="connect" class="primary">Connect UART</button>
          <button id="disconnect" disabled>Disconnect</button>
        </div>
      </div>

      <div class="group checks">
        <label><input id="showR0" type="checkbox" checked> r0</label>
        <label><input id="showR1" type="checkbox" checked> r1</label>
        <label><input id="showR2" type="checkbox" checked> r2</label>
      </div>

      <div class="group">
        <div class="row">
          <button id="downloadCsv">Download CSV</button>
          <button id="downloadLog">Download Raw</button>
        </div>
        <div class="row">
          <button id="clearData">Clear</button>
          <button id="demoData">Demo</button>
        </div>
      </div>

      <p class="note">
        This page reads UART through the browser Web Serial API. It requires Chrome or Edge over HTTPS or localhost. The radar must be connected to the same PC that opens this page.
      </p>
    </aside>

    <section class="plot-wrap">
      <canvas id="plot" width="1200" height="650"></canvas>
      <div class="metrics">
        <div class="metric"><span>Records</span><b id="count">0</b></div>
        <div class="metric"><span>Bad JSON</span><b id="badCount">0</b></div>
        <div class="metric"><span>fn</span><b id="lastFn">-</b></div>
        <div class="metric"><span>Last r0</span><b id="lastR0">-</b></div>
        <div class="metric">
          <span>Legend</span>
          <div class="legend">
            <span class="r0"><i class="swatch"></i>r0</span>
            <span class="r1"><i class="swatch"></i>r1</span>
            <span class="r2"><i class="swatch"></i>r2</span>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const els = {
      baudRate: document.getElementById("baudRate"),
      windowSize: document.getElementById("windowSize"),
      connect: document.getElementById("connect"),
      disconnect: document.getElementById("disconnect"),
      showR0: document.getElementById("showR0"),
      showR1: document.getElementById("showR1"),
      showR2: document.getElementById("showR2"),
      downloadCsv: document.getElementById("downloadCsv"),
      downloadLog: document.getElementById("downloadLog"),
      clearData: document.getElementById("clearData"),
      demoData: document.getElementById("demoData"),
      status: document.getElementById("status"),
      canvas: document.getElementById("plot"),
      count: document.getElementById("count"),
      badCount: document.getElementById("badCount"),
      lastFn: document.getElementById("lastFn"),
      lastR0: document.getElementById("lastR0")
    };

    const colors = {
      r0: "#ff0000",
      r1: "#00a000",
      r2: "#0000ff",
      grid: "#edf0f4",
      axis: "#667085",
      text: "#17202a",
      muted: "#667085"
    };

    const state = {
      port: null,
      reader: null,
      reading: false,
      records: [],
      rawLines: [],
      badCount: 0,
      demoTimer: null
    };

    function setStatus(text) {
      els.status.textContent = text;
    }

    function setConnected(isConnected) {
      els.connect.disabled = isConnected;
      els.disconnect.disabled = !isConnected;
      els.baudRate.disabled = isConnected;
    }

    function numberOrNull(value) {
      const n = Number(value);
      return Number.isFinite(n) ? n : null;
    }

    function parseJsonLine(line) {
      const trimmed = line.trim();
      if (!trimmed) return;
      state.rawLines.push(trimmed);

      let obj;
      try {
        obj = JSON.parse(trimmed);
      } catch (_err) {
        state.badCount += 1;
        updateMetrics();
        return;
      }

      const fn = numberOrNull(obj.fn ?? state.records.length);
      const rec = {
        pc_time_iso: new Date().toISOString(),
        pc_time_ms: Date.now(),
        fn,
        r0: numberOrNull(obj.r0),
        r1: numberOrNull(obj.r1),
        r2: numberOrNull(obj.r2),
        raw_json: trimmed
      };

      if (rec.fn === null || (rec.r0 === null && rec.r1 === null && rec.r2 === null)) {
        state.badCount += 1;
        updateMetrics();
        return;
      }

      state.records.push(rec);
      if (state.records.length > 20000) state.records.shift();
      updateMetrics();
      requestDraw();
    }

    async function connectSerial() {
      if (!("serial" in navigator)) {
        setStatus("Web Serial is not available in this browser.");
        return;
      }

      stopDemo();
      const baudRate = Number(els.baudRate.value) || 921600;
      try {
        state.port = await navigator.serial.requestPort();
        await state.port.open({ baudRate });
        setConnected(true);
        setStatus(`Connected @ ${baudRate}`);
        state.reading = true;
        await readLoop();
      } catch (err) {
        setStatus(`Connect failed: ${err.message}`);
        await disconnectSerial();
      }
    }

    async function readLoop() {
      const decoder = new TextDecoder();
      let buffer = "";

      while (state.port && state.reading) {
        state.reader = state.port.readable.getReader();
        try {
          while (state.reading) {
            const { value, done } = await state.reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split(/\r?\n/);
            buffer = lines.pop() || "";
            for (const line of lines) parseJsonLine(line);
          }
        } finally {
          state.reader.releaseLock();
          state.reader = null;
        }
      }
    }

    async function disconnectSerial() {
      state.reading = false;
      if (state.reader) {
        try {
          await state.reader.cancel();
        } catch (_err) {
        }
      }
      if (state.port) {
        try {
          await state.port.close();
        } catch (_err) {
        }
      }
      state.port = null;
      setConnected(false);
      setStatus("Disconnected.");
    }

    function stopDemo() {
      if (state.demoTimer) {
        clearInterval(state.demoTimer);
        state.demoTimer = null;
      }
    }

    function startDemo() {
      stopDemo();
      disconnectSerial();
      let fn = state.records.length ? Number(state.records[state.records.length - 1].fn) + 1 : 0;
      state.demoTimer = setInterval(() => {
        const t = fn / 30;
        parseJsonLine(JSON.stringify({
          fn,
          r0: 0.6 + Math.sin(t) * 0.08,
          r1: 1.0 + Math.sin(t * 0.7 + 1) * 0.1,
          r2: 1.45 + Math.cos(t * 0.55) * 0.12
        }));
        fn += 1;
      }, 50);
      setStatus("Demo data running.");
    }

    function clearData() {
      state.records = [];
      state.rawLines = [];
      state.badCount = 0;
      updateMetrics();
      drawPlot();
      setStatus("Cleared.");
    }

    function updateMetrics() {
      const last = state.records[state.records.length - 1];
      els.count.textContent = String(state.records.length);
      els.badCount.textContent = String(state.badCount);
      els.lastFn.textContent = last ? String(last.fn) : "-";
      els.lastR0.textContent = last && last.r0 !== null ? last.r0.toFixed(3) : "-";
    }

    let drawQueued = false;
    function requestDraw() {
      if (drawQueued) return;
      drawQueued = true;
      requestAnimationFrame(() => {
        drawQueued = false;
        drawPlot();
      });
    }

    function resizeCanvas() {
      const rect = els.canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      const width = Math.max(600, Math.floor(rect.width * dpr));
      const height = Math.max(360, Math.floor(rect.height * dpr));
      if (els.canvas.width !== width || els.canvas.height !== height) {
        els.canvas.width = width;
        els.canvas.height = height;
        drawPlot();
      }
    }

    function drawPlot() {
      resizeCanvas();
      const ctx = els.canvas.getContext("2d");
      const w = els.canvas.width;
      const h = els.canvas.height;
      ctx.clearRect(0, 0, w, h);

      const pad = { left: 62, right: 28, top: 26, bottom: 46 };
      const box = {
        x: pad.left,
        y: pad.top,
        w: Math.max(10, w - pad.left - pad.right),
        h: Math.max(10, h - pad.top - pad.bottom)
      };

      const windowSize = Math.max(20, Number(els.windowSize.value) || 600);
      const points = state.records.slice(-windowSize);

      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, w, h);

      if (!points.length) {
        ctx.fillStyle = colors.muted;
        ctx.font = "18px Arial";
        ctx.textAlign = "center";
        ctx.fillText("Waiting for UART JSON records", w / 2, h / 2);
        return;
      }

      const values = [];
      for (const p of points) {
        if (els.showR0.checked && p.r0 !== null) values.push(p.r0);
        if (els.showR1.checked && p.r1 !== null) values.push(p.r1);
        if (els.showR2.checked && p.r2 !== null) values.push(p.r2);
      }

      if (!values.length) return;

      let minY = Math.min(...values);
      let maxY = Math.max(...values);
      if (minY === maxY) {
        minY -= 0.5;
        maxY += 0.5;
      }
      const margin = (maxY - minY) * 0.12;
      minY -= margin;
      maxY += margin;

      const minFn = points[0].fn;
      const maxFn = points[points.length - 1].fn === minFn ? minFn + 1 : points[points.length - 1].fn;
      const sx = (fn) => box.x + ((fn - minFn) / (maxFn - minFn)) * box.w;
      const sy = (y) => box.y + box.h - ((y - minY) / (maxY - minY)) * box.h;

      drawAxes(ctx, box, minFn, maxFn, minY, maxY);
      if (els.showR0.checked) drawSeries(ctx, points, "r0", colors.r0, sx, sy);
      if (els.showR1.checked) drawSeries(ctx, points, "r1", colors.r1, sx, sy);
      if (els.showR2.checked) drawSeries(ctx, points, "r2", colors.r2, sx, sy);
    }

    function drawAxes(ctx, box, minFn, maxFn, minY, maxY) {
      ctx.strokeStyle = colors.grid;
      ctx.lineWidth = 1;
      ctx.font = "12px Arial";
      ctx.textAlign = "right";
      ctx.textBaseline = "middle";

      for (let i = 0; i <= 5; i += 1) {
        const y = box.y + (box.h * i) / 5;
        const val = maxY - ((maxY - minY) * i) / 5;
        ctx.beginPath();
        ctx.moveTo(box.x, y);
        ctx.lineTo(box.x + box.w, y);
        ctx.stroke();
        ctx.fillStyle = colors.axis;
        ctx.fillText(val.toFixed(3), box.x - 8, y);
      }

      ctx.textAlign = "center";
      ctx.textBaseline = "top";
      for (let i = 0; i <= 5; i += 1) {
        const x = box.x + (box.w * i) / 5;
        const fn = minFn + ((maxFn - minFn) * i) / 5;
        ctx.beginPath();
        ctx.moveTo(x, box.y);
        ctx.lineTo(x, box.y + box.h);
        ctx.stroke();
        ctx.fillStyle = colors.axis;
        ctx.fillText(fn.toFixed(0), x, box.y + box.h + 10);
      }

      ctx.strokeStyle = colors.axis;
      ctx.strokeRect(box.x, box.y, box.w, box.h);
      ctx.fillStyle = colors.text;
      ctx.textAlign = "center";
      ctx.fillText("fn", box.x + box.w / 2, box.y + box.h + 28);
    }

    function drawSeries(ctx, points, key, color, sx, sy) {
      ctx.strokeStyle = color;
      ctx.fillStyle = color;
      ctx.lineWidth = 2;
      let started = false;
      ctx.beginPath();
      for (const p of points) {
        if (p[key] === null) {
          started = false;
          continue;
        }
        const x = sx(p.fn);
        const y = sy(p[key]);
        if (!started) {
          ctx.moveTo(x, y);
          started = true;
        } else {
          ctx.lineTo(x, y);
        }
      }
      ctx.stroke();

      const step = Math.max(1, Math.floor(points.length / 300));
      for (let i = 0; i < points.length; i += step) {
        const p = points[i];
        if (p[key] === null) continue;
        const x = sx(p.fn);
        const y = sy(p[key]);
        ctx.beginPath();
        ctx.arc(x, y, 2.2, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function csvEscape(value) {
      if (value === null || value === undefined) return "";
      const text = String(value);
      return /[",\n\r]/.test(text) ? `"${text.replace(/"/g, '""')}"` : text;
    }

    function download(name, type, content) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = name;
      a.click();
      URL.revokeObjectURL(url);
    }

    function downloadCsv() {
      const header = ["pc_time_iso", "pc_time_ms", "fn", "r0", "r1", "r2", "raw_json"];
      const rows = state.records.map((r) => header.map((key) => csvEscape(r[key])).join(","));
      download(`jb_GEP_dataset_${timestamp()}.csv`, "text/csv;charset=utf-8", [header.join(","), ...rows].join("\n"));
    }

    function downloadLog() {
      download(`jb_GEP_dataset_${timestamp()}_raw.log`, "text/plain;charset=utf-8", state.rawLines.join("\n"));
    }

    function timestamp() {
      const d = new Date();
      const p = (n) => String(n).padStart(2, "0");
      return `${d.getFullYear()}${p(d.getMonth() + 1)}${p(d.getDate())}_${p(d.getHours())}${p(d.getMinutes())}${p(d.getSeconds())}`;
    }

    els.connect.addEventListener("click", connectSerial);
    els.disconnect.addEventListener("click", disconnectSerial);
    els.clearData.addEventListener("click", clearData);
    els.demoData.addEventListener("click", startDemo);
    els.downloadCsv.addEventListener("click", downloadCsv);
    els.downloadLog.addEventListener("click", downloadLog);
    for (const el of [els.windowSize, els.showR0, els.showR1, els.showR2]) {
      el.addEventListener("input", drawPlot);
    }
    window.addEventListener("resize", resizeCanvas);
    window.addEventListener("beforeunload", () => {
      stopDemo();
      if (state.port) disconnectSerial();
    });

    if (!("serial" in navigator)) {
      setStatus("Web Serial needs Chrome or Edge over HTTPS.");
    }
    updateMetrics();
    resizeCanvas();
  </script>
</body>
</html>
